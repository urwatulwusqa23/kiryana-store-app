# Render Blueprint: API + free PostgreSQL (one deploy).
# In Render: Blueprints → New → connect this repo → use this file (default path: render.yaml).
# After deploy, copy the Web Service URL and set it in Vercel as VITE_API_URL (see docs).
#
# Adjust `repo` to your GitHub URL if the dashboard asks for it.

databases:
  - name: kiryana-db
    plan: free
    region: oregon

services:
  - type: web
    name: kiryana-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/items
    # ASPNETCORE_URLS is set in backend/entrypoint.sh from $PORT (Render-injected; often 10000, not 8080).
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: kiryana-db
          property: connectionString
