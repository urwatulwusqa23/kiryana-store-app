services:
  postgres:
    image: postgres:16-alpine
    container_name: kiryana_postgres
    environment:
      POSTGRES_USER: kiryana
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-devlocal123}"
      POSTGRES_DB: kiryanadb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiryana -d kiryanadb"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiryana_backend
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=kiryanadb;Username=kiryana;Password=${POSTGRES_PASSWORD:-devlocal123}"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kiryana_frontend
    ports:
      - "13000:80"
    depends_on:
      - backend

volumes:
  pgdata:
