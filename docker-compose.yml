services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kiryana_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" -C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiryana_backend
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=KiryanaStoreDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "18080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kiryana_frontend
    ports:
      - "13000:80"
    depends_on:
      - backend

volumes:
  sqlserver_data:
